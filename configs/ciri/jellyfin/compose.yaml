# Jellyfin — media server, NVENC/NVDEC via the GTX 1060 passed through to ciri.
# Lab adaptations: pinned image tag, media (read-write) from the external USB
# HDD on geralt via virtiofs, config/cache on local NVMe, TZ=Asia/Kolkata,
# dedicated bridge network (not host networking — see README).
#
# NVIDIA_DRIVER_CAPABILITIES is load-bearing: the toolkit's default
# (utility,compute) does NOT include `video`, and without it NVENC/NVDEC are
# invisible inside the container even though nvidia-smi works.

services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      # DB, artwork, trickplay — small-file random I/O, keep on NVMe.
      - ./config:/config
      # Transcode scratch + image cache; regenerable.
      - ./cache:/cache
      # Media, read-WRITE (2026-07-23): the OpenSubtitles plugin saves
      # downloaded subtitle sidecars next to each video. The library is
      # disposable so subs come and go with the media — no PBS need, and the
      # least-privilege read-only bind wasn't worth the internal-storage detour.
      # create_host_path:false is the missing-mount guard (independent of rw):
      # if the USB disk failed to mount on geralt (nofail) or the share is empty,
      # this path does not exist and the container refuses to start — instead of
      # Jellyfin scanning an empty library and evicting every item from its DB.
      - type: bind
        source: /mnt/media/library
        target: /media
        bind:
          create_host_path: false
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: Asia/Kolkata
      # Needed for NVENC — see header note.
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
      NVIDIA_VISIBLE_DEVICES: all
      # JELLYFIN_PublishedServerUrl intentionally UNSET (2026-07-22): forcing a
      # hostname broke the Samsung TV's native player, which can't resolve the
      # internal DNS name. With it unset, clients stream from the address they
      # connected on — connect the TV by IP. See README troubleshooting.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - jellyfin_net

networks:
  jellyfin_net:
    driver: bridge
